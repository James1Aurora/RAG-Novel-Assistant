services:
  rag-app:
    build: .
    image: rag-novel-app:latest
    ports:
      - "8501:8501"
    environment:
      # host-gateway mengarah ke host DO tempat Ollama jalan langsung
      - OLLAMA_BASE_URL=http://host-gateway:11434
      - CHROMA_PERSIST_DIR=/data/chroma_db
      - DOCS_DIR=/app/docs
    extra_hosts:
      - "host-gateway:host-gateway"
    volumes:
      - ./chroma_db:/data/chroma_db
      - ./docs:/app/docs
    restart: unless-stopped
